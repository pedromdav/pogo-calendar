name: Build & publish calendar

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Generate calendar
        # Set repo variable POGO_TZ (Settings -> Secrets and variables -> Actions -> Variables)
        # to change the feed's timezone without editing code.
        # Falls back to the default in generate.py when unset.
        env:
          POGO_TZ: ${{ vars.POGO_TZ }}
        run: python generate.py
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
